<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Objednávka školního bufetu</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f7fb;
}
h1 {
  text-align: center;
  background: #2a72d4;
  color: white;
  padding: 20px;
}
.container {
  width: 90%;
  max-width: 500px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}
.item {
  display: flex;
  justify-content: space-between;
  margin: 12px 0;
  font-size: 18px;
}
input[type="number"] {
  width: 70px;
  text-align: center;
}
#celkem, #pocet {
  text-align: center;
  font-size: 22px;
  margin-top: 15px;
  font-weight: bold;
  color: #2a72d4;
}

/* ⬇️ NOVÉ: Stylování pro nová výplňová pole */
.input-group {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.input-group label {
  font-weight: bold;
  color: #333;
  font-size: 14px;
}
.input-group input {
  padding: 12px;
  font-size: 16px;
  border: 2px solid #cbd5e1;
  border-radius: 8px;
  width: 100%;
  box-sizing: border-box;
  transition: border-color 0.2s;
}
.input-group input:focus {
  border-color: #2a72d4;
  outline: none;
}
/* ⬆️ Konec stylování nových polí */

button {
  width: 100%;
  padding: 15px;
  margin-top: 25px;
  font-size: 24px;
  background: #ff6b35;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
button:hover {
  background: #e85a28;
}
</style>
</head>

<body>

<h1>SŠ Kostka – OBJEDNÁVKY BUFET</h1>

<div class="container">
  <div id="items"></div>

  <div id="celkem">Celková cena: 0 Kč</div>
  <div id="pocet">Počet kusů: 0</div>

  <div class="input-group">
    <label for="jmeno">VAŠE JMÉNO (Příjmení Jméno):</label>
    <input type="text" id="jmeno" placeholder="Např. Novák Jan" required>
  </div>

  <div class="input-group">
    <label for="telefon">TELEFON:</label>
    <input type="tel" id="telefon" placeholder="+420 000 000 000" required>
  </div>
  <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>
</div>

<script>

let items = [];

// ✅ načítání CSV
async function loadCSV() {
  try {
    const response = await fetch("data_bufet.csv?t=" + Date.now());
    if (!response.ok) {
      throw new Error("Soubor nebyl nalezen");
    }

    const text = await response.text();
    parseCSV(text);
    renderItems();

  } catch (err) {
    console.error(err);
    alert("Chyba načítání CSV.");
  }
}

// ✅ parsování CSV (přeskočení hlavičku)
function parseCSV(text) {
  items = [];

  const lines = text.split("\n");

  // ⬇️ přeskočíme první řádek (hlavičku)
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();

    if (!line) continue;

    const [nazev, cena] = line.split(";");

    if (nazev && cena) {
      items.push({
        nazev: nazev.trim(),
        cena: parseFloat(cena.replace(",", ".")),
        mnozstvi: 0
      });
    }
  }
}

// ✅ vykreslení
function renderItems() {
  const container = document.getElementById("items");
  container.innerHTML = "";

  items.forEach((item, index) => {

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${item.nazev} (${item.cena} Kč)</span>
      <input type="number" min="0" value="0"
        onchange="updateItem(${index}, this.value)">
    `;

    container.appendChild(div);
  });
}

// ✅ změna množství
function updateItem(index, value) {
  items[index].mnozstvi = parseInt(value) || 0;
  updateSummary();
}

// ✅ přepočet
function updateSummary() {
  let celkem = 0;
  let pocet = 0;

  items.forEach(item => {
    celkem += item.cena * item.mnozstvi;
    pocet += item.mnozstvi;
  });

  document.getElementById("celkem").innerText =
    "Celková cena: " + celkem.toFixed(2) + " Kč";

  document.getElementById("pocet").innerText =
    "Počet kusů: " + pocet;
}

// ⬇️ NOVÉ: Kompletně upravená funkce pro odeslání s validací a MAILTO funkcí
function odeslatObjednavku() {
  // Načtení hodnot z nových polí
  const jmeno = document.getElementById("jmeno").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  // 1. Validace vyplnění kontaktních údajů
  if (!jmeno || !telefon) {
    alert("Prosím, vyplňte Vaše jméno a telefonní číslo před odesláním objednávky.");
    return;
  }

  // Filter vybraného zboží
  const vybranePolozky = items.filter(item => item.mnozstvi > 0);

  // 2. Validace, zda košík není prázdný
  if (vybranePolozky.length === 0) {
    alert("Nevybral jsi žádné položky!");
    return;
  }

  // Sestavení textu e-mailu (těla zprávy)
  let emailBody = `Objednávka školního bufetu\n`;
  emailBody += `=================================\n`;
  emailBody += `Zákazník: ${jmeno}\n`;
  emailBody += `Telefon: ${telefon}\n`;
  emailBody += `=================================\n\n`;
  emailBody += `Objednané položky:\n`;

  let celkovaCena = 0;
  let celkovyPocetKusu = 0;

  // Smyčka pro výpis jednotlivého zboží, množství, ceny za kus a mezisoučtu
  vybranePolozky.forEach(item => {
    const mezisoucet = item.cena * item.mnozstvi;
    celkovaCena += mezisoucet;
    celkovyPocetKusu += item.mnozstvi;
    
    emailBody += `- ${item.nazev}: ${item.mnozstvi} ks (Cena: ${item.cena} Kč/ks) = ${mezisoucet.toFixed(2)} Kč\n`;
  });

  emailBody += `\n---------------------------------\n`;
  emailBody += `Celkový počet kusů: ${celkovyPocetKusu}\n`;
  emailBody += `Celková cena objednávky: ${celkovaCena.toFixed(2)} Kč\n`;

  // Definice příjemce a předmětu e-mailu
  const prijemce = "sveda.michael@kostka-skola.cz";
  const predmet = `Objednávka bufet - ${jmeno}`;

  // Sestavení a zakódování mailto odkazu
  const mailtoUrl = `mailto:${prijemce}?subject=${encodeURIComponent(predmet)}&body=${encodeURIComponent(emailBody)}`;

  // Otevření e-mailového klienta na zařízení uživatele
  window.location.href = mailtoUrl;
}
// ⬆️ Konec nové mailto funkce

// start
loadCSV();

</script>

</body>
</html>
